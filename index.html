<script>
// Ce code est pour la page web dans le navigateur
document.addEventListener('DOMContentLoaded', function() {
    const payTitle = document.getElementById('pay-title');
    const paySub = document.getElementById('pay-sub');
    const payOptions = document.getElementById('pay-options');
    
    payTitle.textContent = 'Choisir une option de paiement';
    
    // Exemple d'options de paiement
    const options = ['Carte bancaire', 'PayPal', 'Virement'];
    
    options.forEach(function(option) {
        const div = document.createElement('div');
        div.textContent = option;
        div.style.padding = '10px';
        div.style.margin = '5px';
        div.style.border = '1px solid #ccc';
        div.style.cursor = 'pointer';
        payOptions.appendChild(div);
    });
});
</script>
