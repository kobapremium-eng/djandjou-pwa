<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="description" content="DJANDJOU 3.0 — Rencontres authentiques, connexions infinies"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="DJANDJOU"/>
  <link rel="manifest" href="manifest.json"/>
  <title>DJANDJOU 3.0</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0a0a0f;
      --card: #0f0f1a;
      --card2: #141428;
      --pink: #e91e63;
      --gold: #f5a623;
      --purple: #7c3aed;
      --green: #10b981;
      --red: #ef4444;
      --text: #f0f0ff;
      --muted: #5a5a7a;
      --border: #1a1a30;
      --grad: linear-gradient(135deg, #e91e63, #f5a623);
      --grad2: linear-gradient(135deg, #7c3aed, #e91e63);
      --radius: 20px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      width: 100%;
      max-width: 100vw;
      margin: 0 auto;
      overflow-x: hidden;
      position: relative;
      font-size: clamp(13px, 3.5vw, 16px);
    }

    /* Tablet & Desktop centering */
    @media (min-width: 540px) {
      body { max-width: 480px; }
    }

    /* ── UTILITIES ── */
    .grad-text { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .5px; }
    .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--grad); color: #fff; font-size: 16px; font-family: 'Outfit', sans-serif; font-weight: 600; cursor: pointer; box-shadow: 0 8px 30px rgba(233,30,99,.35); transition: transform .15s, box-shadow .15s; }
    .btn-primary:active { transform: scale(.97); box-shadow: 0 4px 15px rgba(233,30,99,.25); }
    .btn-ghost { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 16px; background: transparent; color: var(--muted); font-size: 14px; font-family: 'Outfit', sans-serif; cursor: pointer; transition: border-color .2s; }
    .btn-ghost:hover { border-color: var(--pink); color: var(--pink); }
    .input-field { width: 100%; padding: 14px 18px; background: var(--card2); border: 1.5px solid var(--border); border-radius: 14px; color: var(--text); font-size: 15px; font-family: 'Outfit', sans-serif; outline: none; transition: border-color .2s; }
    .input-field:focus { border-color: var(--pink); }
    .input-field::placeholder { color: var(--muted); }
    .field-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .error-box { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); border-radius: 12px; padding: 12px 16px; color: #ff6b8a; font-size: 13px; }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeUp .3s ease; }
    .screen.active { display: flex; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* ── SPLASH ── */
    #splash {
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vh, 24px);
      background: radial-gradient(ellipse at 50% 30%, #1a0030 0%, var(--bg) 70%);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 20px;
    }
    .splash-logo { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 12vw, 64px); font-weight: 700; line-height: 1; text-align: center; }
    .splash-version { font-size: clamp(11px, 3vw, 14px); letter-spacing: 8px; color: var(--muted); text-transform: uppercase; margin-top: -8px; }
    .splash-tagline { font-size: clamp(12px, 3.5vw, 14px); color: var(--muted); letter-spacing: 1.5px; text-align: center; max-width: 260px; line-height: 1.6; }
    .splash-flags { display: flex; gap: 12px; font-size: clamp(20px, 6vw, 28px); }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }

    /* ── AUTH ── */
    #login, #register, #verify {
      padding: 0;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    .auth-hero {
      height: clamp(120px, 22vh, 180px);
      background: radial-gradient(ellipse at 50% 100%, #1a0030 0%, var(--bg) 70%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: clamp(16px, 4vh, 28px);
    }
    .auth-logo { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 9vw, 42px); font-weight: 700; }
    .auth-body { flex: 1; padding: clamp(16px, 5vw, 28px) clamp(16px, 6vw, 24px); display: flex; flex-direction: column; gap: clamp(12px, 3vh, 18px); overflow-y: auto; }
    .auth-title { font-size: clamp(22px, 7vw, 30px); font-weight: 700; font-family: 'Cormorant Garamond', serif; line-height: 1.1; }
    .auth-sub { font-size: clamp(12px, 3.5vw, 14px); color: var(--muted); margin-top: 4px; }
    .auth-link { text-align: center; font-size: clamp(12px, 3.5vw, 13px); color: var(--muted); cursor: pointer; }
    .auth-link span { color: var(--pink); font-weight: 600; }
    .gender-row { display: flex; gap: 8px; }
    .gender-btn { flex: 1; padding: clamp(8px, 2.5vw, 12px) 8px; border-radius: 12px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: clamp(11px, 3vw, 13px); font-family: 'Outfit', sans-serif; font-weight: 600; cursor: pointer; transition: all .2s; text-align: center; }
    .gender-btn.active { border-color: var(--pink); background: rgba(233,30,99,.12); color: var(--pink); }

    /* ── VERIFY ── */
    #verify { align-items: center; justify-content: center; gap: 20px; padding: 40px 28px; text-align: center; }
    .verify-icon { font-size: 80px; animation: bounceIn .5s ease; }
    @keyframes bounceIn { 0%{transform:scale(.3);opacity:0} 60%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    .verify-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; }
    .verify-email { color: var(--pink); font-weight: 600; }

    /* ── HEADER ── */
    .app-header { padding: 16px 20px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .icon-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }

    /* ── NAV ── */
    .bottom-nav { display: flex; justify-content: space-around; padding: 12px 0 calc(16px + var(--safe-bottom)); background: var(--card); border-top: 1px solid var(--border); position: sticky; bottom: 0; z-index: 100; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 12px; transition: color .2s; position: relative; }
    .nav-btn.active { color: var(--pink); }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--pink); position: absolute; top: 2px; right: 8px; }

    /* ── DISCOVER ── */
    .filters { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { padding: 8px 20px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-family: 'Outfit', sans-serif; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all .2s; }
    .filter-btn.active { border-color: transparent; background: var(--grad); color: #fff; }

    .profile-card { margin: 0 clamp(12px, 4vw, 20px); border-radius: var(--radius); overflow: hidden; background: var(--card); border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(233,30,99,.12); position: relative; }
    .card-img { width: 100%; height: clamp(240px, 55vw, 320px); object-fit: cover; display: block; background: var(--card2); }
    .card-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 200px; background: linear-gradient(to top, rgba(10,10,15,.98) 0%, transparent 100%); }
    .card-badges { position: absolute; top: 14px; right: 14px; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .card-online { position: absolute; top: 14px; left: 14px; }
    .card-info { padding: 18px 20px 20px; }
    .card-name { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 700; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-location { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .card-bio { font-size: 14px; color: #b0b0cc; line-height: 1.65; margin-top: 10px; }
    .card-lifestyle { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; }

    .swipe-actions { display: flex; justify-content: center; align-items: center; gap: 16px; padding: 18px 20px 8px; }
    .swipe-btn { border: none; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform .15s; }
    .swipe-btn:active { transform: scale(.92); }
    .swipe-pass { width: 64px; height: 64px; background: var(--card2); font-size: 24px; border: 1.5px solid var(--border); }
    .swipe-super { width: 52px; height: 52px; background: linear-gradient(135deg, #3b82f6, #7c3aed); font-size: 20px; box-shadow: 0 6px 20px rgba(124,58,237,.4); }
    .swipe-like { width: 64px; height: 64px; background: var(--grad); font-size: 24px; box-shadow: 0 8px 28px rgba(233,30,99,.45); }

    /* ── MATCH OVERLAY ── */
    .match-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: flex; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(10px); animation: fadeUp .3s ease; }
    .match-box { background: linear-gradient(135deg, #1a0030, #0f0f1a); border: 2px solid var(--pink); border-radius: 28px; padding: 36px 32px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 30px 80px rgba(233,30,99,.5); }
    .match-emoji { font-size: 64px; margin-bottom: 12px; animation: bounceIn .4s ease; }
    .match-title { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 700; }
    .match-sub { font-size: 14px; color: var(--muted); margin: 8px 0 20px; }
    .match-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--pink); margin: 0 auto 16px; display: block; object-fit: cover; }
    .match-name { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .match-actions { display: flex; flex-direction: column; gap: 10px; }

    /* ── MATCHES TAB ── */
    .matches-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px 20px; }
    .match-card { border-radius: 18px; overflow: hidden; background: var(--card); border: 1px solid var(--border); cursor: pointer; position: relative; }
    .match-card-img { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--card2); }
    .match-card-info { padding: 10px 12px; }
    .match-card-name { font-weight: 700; font-size: 15px; }
    .match-card-city { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .online-dot { position: absolute; top: 10px; left: 10px; width: 12px; height: 12px; border-radius: 50%; background: var(--green); border: 2px solid var(--bg); }
    .empty-state { text-align: center; padding: 60px 30px; }
    .empty-icon { font-size: 60px; margin-bottom: 16px; }
    .empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── CHAT ── */
    .chat-list { padding: 12px 20px; display: flex; flex-direction: column; gap: 10px; }
    .chat-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: background .2s; }
    .chat-item:active { background: var(--card2); }
    .chat-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid var(--pink); flex-shrink: 0; background: var(--card2); position: relative; }
    .chat-info { flex: 1; overflow: hidden; }
    .chat-name { font-weight: 700; font-size: 15px; }
    .chat-preview { font-size: 12px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-unread { background: var(--pink); color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .chat-window { display: flex; flex-direction: column; height: 100vh; }
    .chat-header { padding: 14px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); background: var(--card); }
    .chat-back { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
    .chat-header-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--pink); object-fit: cover; background: var(--card2); }
    .chat-header-name { font-weight: 700; font-size: 16px; }
    .chat-header-status { font-size: 12px; color: var(--green); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .bubble { max-width: 76%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.55; }
    .bubble.me { background: var(--grad); color: #fff; align-self: flex-end; border-radius: 18px 18px 4px 18px; box-shadow: 0 4px 16px rgba(233,30,99,.3); }
    .bubble.them { background: var(--card2); color: var(--text); align-self: flex-start; border-radius: 18px 18px 18px 4px; }
    .chat-input-row { display: flex; gap: 10px; padding: 14px 20px calc(14px + var(--safe-bottom)); background: var(--card); border-top: 1px solid var(--border); }
    .chat-input { flex: 1; background: var(--card2); border: 1.5px solid var(--border); border-radius: 24px; padding: 12px 18px; color: var(--text); font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; }
    .chat-send { width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--grad); color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 16px rgba(233,30,99,.4); }

    /* ── PREMIUM ── */
    .premium-content { padding: 16px 20px; overflow-y: auto; }
    .billing-toggle { display: flex; background: var(--card2); border-radius: 14px; padding: 4px; margin-bottom: 18px; border: 1px solid var(--border); }
    .billing-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent; color: var(--muted); font-size: 13px; font-family: 'Outfit', sans-serif; font-weight: 600; cursor: pointer; transition: all .2s; }
    .billing-btn.active { background: var(--grad); color: #fff; }
    .plan-card { border-radius: 20px; padding: 22px; background: var(--card); border: 2px solid var(--border); margin-bottom: 14px; position: relative; transition: border-color .2s; }
    .plan-card.popular { background: linear-gradient(135deg, #1a0030, #200040); border-color: var(--pink); }
    .popular-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--grad); color: #fff; border-radius: 20px; padding: 4px 16px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .plan-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .plan-price { font-size: 28px; font-weight: 800; margin-bottom: 14px; }
    .plan-feature { font-size: 13px; color: #b0b0cc; padding: 5px 0; display: flex; align-items: center; gap: 8px; }
    .plan-feature-check { color: var(--pink); font-weight: 700; }

    /* ── PROFILE ── */
    .profile-content { padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
    .profile-avatar-wrap { text-align: center; }
    .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; margin: 0 auto; box-shadow: 0 8px 28px rgba(233,30,99,.45); }
    .profile-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; text-align: center; margin-top: 12px; }
    .profile-email { font-size: 13px; color: var(--muted); text-align: center; margin-top: 4px; }
    .profile-section { background: var(--card); border-radius: 18px; padding: 18px 20px; border: 1px solid var(--border); }
    .profile-section-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; }
    .profile-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .profile-item:last-child { border-bottom: none; }
    .profile-item-label { font-size: 13px; color: var(--muted); }
    .profile-item-value { font-size: 14px; font-weight: 600; }

    /* ── PAY MODAL ── */
    .pay-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); display: flex; align-items: flex-end; z-index: 999; backdrop-filter: blur(8px); animation: fadeUp .2s ease; }
    .pay-sheet { background: var(--card); border-radius: 26px 26px 0 0; padding: 28px 24px calc(44px + var(--safe-bottom)); width: 100%; border-top: 2px solid rgba(233,30,99,.3); }
    .pay-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .pay-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; }
    .pay-option { display: flex; align-items: center; gap: 14px; padding: 16px; border-radius: 16px; background: var(--card2); border: 1.5px solid var(--border); margin-bottom: 10px; cursor: pointer; transition: border-color .2s; }
    .pay-option:active { border-color: var(--pink); }
    .pay-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .pay-option-name { font-weight: 700; font-size: 15px; }
    .pay-option-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .pay-secure { text-align: center; font-size: 12px; color: var(--muted); margin-top: 14px; }

    /* ── LOADING ── */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animat
